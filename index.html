<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="module">
      const { instance } = await WebAssembly.instantiateStreaming(
        fetch("build/add.wasm"),
      );

      const { add } = instance.exports;

      const a = 3;
      const b = 4;
      const result = add(a, b);
      document.write(`Result of ${a} + ${b} = ${result}`);
    </script>
  </head>
  <body>
    <h1>Super module : WebAssembly</h1>
  </body>
</html>
